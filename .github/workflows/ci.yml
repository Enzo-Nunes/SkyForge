name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [dev]

jobs:
  quality:
    name: Quality and Style (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [db-api, calculator, scraper, web]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: skyforge-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  test-compose:
    name: Compose Integrity and Boot Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose config
        run: docker compose config -q
      
      - name: Start services
        run: docker compose up -d --build
      
      - name: Wait for stack startup
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U skyforge > /dev/null 2>&1; then
              echo "Database ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Database failed to start"
              docker compose logs
              exit 1
            fi
            sleep 1
          done

      - name: Ensure all containers are running
        run: |
          expected_services=(db db-api scraper calculator web)
          for service in "${expected_services[@]}"; do
            container_id=$(docker compose ps -q "$service")
            if [ -z "$container_id" ]; then
              echo "Service '$service' has no container"
              docker compose ps
              exit 1
            fi
            state=$(docker inspect -f '{{.State.Status}}' "$container_id")
            echo "$service state: $state"
            if [ "$state" != "running" ]; then
              echo "Service '$service' is not running"
              docker compose ps
              docker compose logs --no-color "$service" || true
              exit 1
            fi
          done

      - name: Fail if any service exited
        run: |
          exited_count=$(docker compose ps --all --status exited -q | wc -l)
          if [ "$exited_count" -gt 0 ]; then
            echo "Detected exited containers"
            docker compose ps
            docker compose logs --no-color
            exit 1
          fi
      
      - name: View logs
        if: failure()
        run: docker compose logs
      
      - name: Cleanup
        if: always()
        run: docker compose down -v

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [quality, build-docker, test-compose]
    if: always()
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.quality.result }}" == "failure" ||
                "${{ needs.build-docker.result }}" == "failure" ||
                "${{ needs.test-compose.result }}" == "failure" ]]; then
            echo "❌ CI pipeline failed"
            exit 1
          else
            echo "✅ CI pipeline passed"
          fi
